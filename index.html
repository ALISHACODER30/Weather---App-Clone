<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="output.css" rel="stylesheet">
    <link rel="stylesheet" href="input.css">

    <title>Weather App</title>
</head>

<body
    class="relative flex min-h-dvh w-full flex-col items-center justify-center bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 p-2 xs:p-3 sm:p-5 md:p-8 overflow-x-hidden overflow-y-auto sm:overflow-y-hidden">

    <!-- Weather Effects -->
    <div id="weatherEffects" class="pointer-events-none fixed inset-0 z-0 overflow-hidden"></div>

    <main
        class="relative z-10 mx-auto flex w-full min-h-0 max-h-none flex-col items-center justify-center gap-2 sm:max-h-full sm:gap-4 md:gap-6 max-sm:landscape:gap-1 px-1 xs:px-2 py-2 sm:py-0 max-sm:landscape:py-1 max-w-[min(100%,22rem)] xs:max-w-sm sm:max-w-md md:max-w-2xl lg:max-w-3xl">

        <!-- App Heading -->
        <header class="text-center shrink-0 w-full">
            <h1
                class="flex flex-wrap items-center justify-center gap-1.5 xs:gap-2 sm:gap-3 text-xl xs:text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight">
                <span class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl drop-shadow-lg" aria-hidden="true">🌤️</span>
                <span
                    class="bg-gradient-to-r from-white via-cyan-100 to-blue-200 bg-clip-text text-transparent">
                    Weather App
                </span>
            </h1>
        </header>

        <!-- Main Weather Card -->
        <div id="weatherCard"
            class="group relative w-full shrink min-h-0 overflow-hidden rounded-3xl sm:rounded-[32px] md:rounded-[40px] border border-white/15 bg-slate-900/55 backdrop-blur-2xl ring-1 ring-inset ring-white/10 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.55)] text-white transition-all duration-700">

            <div
                class="pointer-events-none absolute -inset-px rounded-3xl sm:rounded-[32px] md:rounded-[40px] bg-gradient-to-br from-cyan-500/25 via-blue-500/10 to-violet-500/20 opacity-70">
            </div>

            <div
                class="pointer-events-none absolute inset-x-4 xs:inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-white/50 to-transparent">
            </div>

            <div
                class="pointer-events-none absolute -top-16 sm:-top-20 left-1/2 h-32 w-32 sm:h-40 sm:w-40 md:h-48 md:w-48 -translate-x-1/2 rounded-full bg-cyan-400/20 blur-3xl">
            </div>

            <div class="relative z-10 p-3 xs:p-4 sm:p-5 md:p-7 lg:p-8 max-sm:landscape:p-3">

                <!-- Search Section -->
                <div class="flex flex-col xs:flex-row gap-2 sm:gap-3 mb-3 sm:mb-4 md:mb-6">

                    <input id="searchInput" type="text" placeholder="Search city..."
                        class="w-full min-w-0 flex-1 rounded-2xl border border-white/10 bg-slate-950/40 px-3 xs:px-4 sm:px-5 py-2 xs:py-2.5 sm:py-3 text-sm sm:text-base md:text-lg text-white shadow-inner shadow-black/20 outline-none placeholder:text-slate-400 transition focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/30">

                    <button id="searchBtn"
                        class="w-full xs:w-auto shrink-0 rounded-2xl bg-gradient-to-r from-cyan-500 to-blue-600 px-4 sm:px-5 py-2 xs:py-2.5 sm:py-3 text-base sm:text-lg md:text-xl shadow-lg shadow-cyan-500/30 transition duration-300 hover:from-cyan-400 hover:to-blue-500 hover:shadow-cyan-400/40 active:scale-95 xs:min-w-[3.25rem]">
                        🔍
                    </button>

                </div>

                <!-- Weather hero -->
                <div
                    class="flex flex-col items-center gap-2 sm:gap-3 mb-3 sm:mb-4 md:mb-6 max-sm:landscape:mb-2 md:flex-row md:items-center md:justify-center md:gap-8 lg:gap-12">

                    <!-- Weather Icon -->
                    <div class="relative flex shrink-0 justify-center">

                        <div
                            class="absolute h-16 w-16 xs:h-20 xs:w-20 sm:h-24 sm:w-24 md:h-28 md:w-28 rounded-full bg-gradient-to-br from-cyan-400/30 to-blue-600/20 blur-2xl">
                        </div>

                        <div id="weatherIcon"
                            class="relative flex h-14 w-14 xs:h-16 xs:w-16 sm:h-20 sm:w-20 md:h-24 md:w-24 items-center justify-center rounded-full border border-white/20 bg-white/5 text-3xl xs:text-4xl sm:text-5xl md:text-6xl shadow-inner shadow-white/5 backdrop-blur-sm">
                            ⛅
                        </div>

                    </div>

                    <!-- Temp & location -->
                    <div class="w-full text-center md:min-w-0 md:flex-1 md:max-w-md">

                        <h1 id="temperature"
                            class="bg-gradient-to-b from-white via-cyan-50 to-blue-200 bg-clip-text text-3xl xs:text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold leading-none tracking-tight text-transparent">
                            --
                        </h1>

                        <h2 id="city"
                            class="mt-1 text-base xs:text-lg sm:text-xl md:text-2xl font-semibold tracking-wide text-white/95 truncate max-w-full px-1">
                            Search City
                        </h2>

                        <p id="condition"
                            class="mt-2 inline-block max-w-full truncate rounded-full border border-white/10 bg-white/5 px-2.5 xs:px-3 py-0.5 xs:py-1 text-[10px] xs:text-xs sm:text-sm font-medium uppercase tracking-wide sm:tracking-widest text-cyan-100/90">
                            Weather Status
                        </p>

                    </div>

                </div>

                <!-- Divider -->
                <div class="mb-3 sm:mb-4 md:mb-6 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent">
                </div>

                <!-- Weather Details -->
                <div class="grid grid-cols-2 gap-2 xs:gap-2.5 sm:gap-3 md:grid-cols-4 md:gap-4">

                    <div
                        class="rounded-xl xs:rounded-2xl border border-white/10 bg-gradient-to-br from-white/10 to-white/[0.02] p-2 xs:p-2.5 sm:p-3 md:p-4 text-center shadow-lg shadow-black/10 transition duration-300 hover:-translate-y-0.5 hover:border-cyan-400/30 hover:shadow-cyan-500/10">

                        <p class="text-[9px] xs:text-[10px] sm:text-xs md:text-sm font-medium uppercase tracking-wider text-slate-400">
                            💧 Humidity
                        </p>

                        <h3 id="humidity" class="mt-0.5 xs:mt-1 text-base xs:text-lg sm:text-xl md:text-2xl font-bold text-white">
                            --
                        </h3>

                    </div>

                    <div
                        class="rounded-xl xs:rounded-2xl border border-white/10 bg-gradient-to-br from-white/10 to-white/[0.02] p-2 xs:p-2.5 sm:p-3 md:p-4 text-center shadow-lg shadow-black/10 transition duration-300 hover:-translate-y-0.5 hover:border-cyan-400/30 hover:shadow-cyan-500/10">

                        <p class="text-[9px] xs:text-[10px] sm:text-xs md:text-sm font-medium uppercase tracking-wider text-slate-400">
                            🌬️ Wind
                        </p>

                        <h3 id="wind" class="mt-0.5 xs:mt-1 text-base xs:text-lg sm:text-xl md:text-2xl font-bold text-white">
                            --
                        </h3>

                    </div>

                    <div
                        class="rounded-xl xs:rounded-2xl border border-white/10 bg-gradient-to-br from-white/10 to-white/[0.02] p-2 xs:p-2.5 sm:p-3 md:p-4 text-center shadow-lg shadow-black/10 transition duration-300 hover:-translate-y-0.5 hover:border-cyan-400/30 hover:shadow-cyan-500/10">

                        <p class="text-[9px] xs:text-[10px] sm:text-xs md:text-sm font-medium uppercase tracking-wider text-slate-400">
                            🌡️ Feels
                        </p>

                        <h3 id="feelsLike" class="mt-0.5 xs:mt-1 text-base xs:text-lg sm:text-xl md:text-2xl font-bold text-white">
                            --
                        </h3>

                    </div>

                    <div
                        class="rounded-xl xs:rounded-2xl border border-white/10 bg-gradient-to-br from-white/10 to-white/[0.02] p-2 xs:p-2.5 sm:p-3 md:p-4 text-center shadow-lg shadow-black/10 transition duration-300 hover:-translate-y-0.5 hover:border-cyan-400/30 hover:shadow-cyan-500/10">

                        <p class="text-[9px] xs:text-[10px] sm:text-xs md:text-sm font-medium uppercase tracking-wider text-slate-400">
                            👁️ Visibility
                        </p>

                        <h3 id="visibility" class="mt-0.5 xs:mt-1 text-base xs:text-lg sm:text-xl md:text-2xl font-bold text-white">
                            --
                        </h3>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>

</html>
